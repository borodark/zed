# /etc/pf.conf — minimal ruleset for a Bastille host.
# External interface: whatever ifconfig shows as UP with a LAN IP.
# On this Mac Pro it's an en-style or ue-style name; set it via a
# macro below so you only change one line if the NIC renames.
ext_if = "ue0"        # adjust if `ifconfig | grep UP` shows a different name
# NAT outbound traffic from Bastille's loopback-style iface so jails
# can reach the outside world using the host's external IP.
nat on $ext_if from (bastille0:network) to any -> ($ext_if)
# Redirection anchor — Bastille writes per-jail rdr rules here.
rdr-anchor "rdr/*"
# Default allow. Tighten later if you care; Bastille's docs assume                                             # permissive host pf + explicit per-jail rules.
pass